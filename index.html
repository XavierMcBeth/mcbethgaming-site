<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>McBeth Gaming</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: white;
            background: url('images/background.png') center center / cover no-repeat fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            width: 100%;
        }

        header {
            text-align: center;
            padding-top: 40px;
        }

        .logo {
            width: 260px;
            max-width: 80%;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px #00ff66);
        }

        h1 {
            font-size: 4rem;
            color: #00ff66;
            text-shadow: 0 0 20px #00ff66;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.4rem;
            color: #cccccc;
            margin-bottom: 40px;
        }

        .content {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        .server-section {
            margin-top: 50px;
        }

        .server-img {
            width: 90%;
            max-width: 900px;
            border-radius: 20px;
            border: 3px solid #00ff66;
            box-shadow: 0 0 25px rgba(0,255,100,0.6);
            margin-bottom: 30px;
        }

        .buttons {
            margin-top: 40px;
        }

        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            background: #00aa44;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: 0.3s ease;
            box-shadow: 0 0 15px rgba(0,255,100,0.5);
        }

        .buttons a:hover {
            background: #00ff66;
            transform: scale(1.05);
        }

        footer {
            margin-top: 80px;
            text-align: center;
            padding-bottom: 30px;
            color: #aaaaaa;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .buttons a {
                width: 80%;
            }
        }
    </style>
</head>

<body>
    <div class="overlay">

        <header>
            <img class="logo" src="images/logo.png" alt="McBeth Gaming Logo">

            <h1>McBeth Gaming</h1>

            <p class="subtitle">
                Family Friendly Streaming • 7 Days to Die Community • Survival Gaming
            </p>
        </header>

        <div class="content">

            <div class="server-section">
                <img class="server-img" src="images/server.png" alt="McBeth Gaming Server">
            </div>

            <div class="buttons">
                <a href="https://www.twitch.tv/mcbeth_gaming" target="_blank">
                    Twitch
                </a>

                <a href="https://www.tiktok.com/@mcbethgaming" target="_blank">
                    TikTok
                </a>

                <a href="https://discord.gg/F8MuZxKUsk" target="_blank">
                    Discord
                </a>
            </div>

        </div>

        <footer>
            © 2026 McBeth Gaming — Fun Not Foul
        </footer>

    </div>
</body>
</html>
