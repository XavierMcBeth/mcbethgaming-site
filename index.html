        .glitch-link {

        .glitch-link::after {
            content: "";

            inset: -5px;
            border-radius: 6px;
            opacity: 0;
            pointer-events: none;
            box-shadow:
                0 0 8px rgba(255, 0, 0, 0.6),
                0 0 18px rgba(255, 0, 0, 0.3);
            animation: navGlitch 20s infinite;
        }

        .glitch-edge {
            position: absolute;
            right: -12px;
            top: -8px;
            width: 16px;
            height: 32px;
            z-index: 5;
            cursor: pointer;
        }

        @keyframes navGlitch {
            0%, 92%, 100% {
                opacity: 0;
                transform: none;

            94% {
                opacity: 1;
                transform: skewX(-10deg) translateX(1px);
            }

            94.4% {
                opacity: 0.35;
                transform: translateX(3px);

            94.8% {
                opacity: 1;
                transform: translateX(-2px);
            }

            95.4% {
                opacity: 0;
                transform: none;
            }
