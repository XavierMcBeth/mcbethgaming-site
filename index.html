<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>McBeth Gaming</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Orbitron',sans-serif;
            color:white;
            background:url('images/background.png') center center / cover no-repeat fixed;
            min-height:100vh;
            overflow-x:hidden;
        }

        .overlay{
            background:rgba(0,0,0,.72);
            min-height:100vh;
            width:100%;
        }

        header{
            text-align:center;
            padding-top:40px;
        }

        .logo{
            width:260px;
            max-width:80%;
            margin-bottom:20px;
            filter:drop-shadow(0 0 14px rgba(0,255,102,.45));
        }

        h1{
            font-size:clamp(3rem,8vw,6rem);
            color:#19ff73;

            text-shadow:
                0 0 6px rgba(25,255,115,.45),
                0 0 14px rgba(25,255,115,.18);

            margin-bottom:15px;
            font-weight:900;
        }

        .subtitle{
            font-size:1.2rem;
            color:#dddddd;
            margin-bottom:50px;
            padding:0 20px;
        }

        .content{
            width:100%;
            max-width:1200px;
            margin:auto;
            padding:20px;
            text-align:center;
        }

        .server-wrapper{
            position:relative;
            width:100%;
            max-width:1100px;
            margin:auto;
        }

        .server-img{
            width:100%;
            border-radius:25px;
            border:3px solid #19ff73;
            box-shadow:0 0 18px rgba(25,255,115,.35);
            display:block;
        }

        .server-overlay{
            position:absolute;
            inset:0;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            background:rgba(0,0,0,.18);
            border-radius:25px;
        }

        .server-overlay h2{
            font-size:clamp(2.5rem,6vw,6rem);
            color:#19ff73;

            text-shadow:
                0 0 4px rgba(25,255,115,.45),
                0 0 10px rgba(25,255,115,.18);

            margin:0;
            font-weight:900;
            letter-spacing:4px;
        }

        .server-overlay p{
            font-size:clamp(1.5rem,4vw,3rem);
            color:#f2f2f2;

            text-shadow:
                0 0 4px rgba(0,0,0,.55);

            margin-top:10px;
            font-weight:700;
            letter-spacing:3px;
        }

        .buttons{
            margin-top:45px;
        }

        .buttons a{
            display:inline-block;
            margin:10px;
            padding:16px 34px;
            background:#119944;
            color:white;
            text-decoration:none;
            border-radius:12px;
            font-size:1rem;
            font-weight:700;
            transition:.3s ease;
            box-shadow:0 0 10px rgba(25,255,115,.25);
        }

        .buttons a:hover{
            background:#19ff73;
            color:black;
            transform:scale(1.05);
            box-shadow:0 0 18px rgba(25,255,115,.45);
        }

        .music-credit{
            margin-top:35px;
            color:#bbbbbb;
            font-size:.9rem;
            font-family:Arial,sans-serif;
        }

        .music-credit a{
            color:#19ff73;
            text-decoration:none;
            font-weight:700;
        }

        footer{
            margin-top:70px;
            text-align:center;
            padding:30px 20px;
            color:#999999;
            font-size:.85rem;
            font-family:Arial,sans-serif;
        }

        audio{
            opacity:.92;
        }

        @media(max-width:768px){

            .subtitle{
                font-size:1rem;
            }

            .buttons a{
                width:80%;
            }

        }

    </style>
</head>

<body>

    <audio autoplay loop controls
           style="
           position:fixed;
           bottom:15px;
           right:15px;
           z-index:999;
           ">
        <source src="music/McBeth Online.mp3" type="audio/mpeg">
    </audio>

    <div class="overlay">

        <header>

            <img class="logo"
                 src="images/logo.png"
                 alt="McBeth Gaming Logo">

            <h1>McBeth Gaming</h1>

            <p class="subtitle">
                Family Friendly Streaming • Community Survival • 7 Days to Die
            </p>

        </header>

        <div class="content">

            <div class="server-wrapper">

                <img src="images/server.png"
                     alt="McBeth Gaming Server"
                     class="server-img">

                <div class="server-overlay">

                    <h2>SERVER ACCESS</h2>

                    <p>COMING SOON</p>

                </div>

            </div>

            <div class="buttons">

                <a href="https://www.twitch.tv/mcbeth_gaming" target="_blank">
                    Twitch
                </a>

                <a href="https://www.tiktok.com/@mcbethgaming" target="_blank">
                    TikTok
                </a>

                <a href="https://discord.gg/F8MuZxKUsk" target="_blank">
                    Discord
                </a>

            </div>

            <div class="music-credit">
                Music by
                <a href="https://www.tiktok.com/@skynetkids" target="_blank">
                    @skynetkids
                </a>
            </div>

        </div>

        <footer>
            © 2026 McBeth Gaming — Fun Not Foul
        </footer>

    </div>

</body>
</html>
