<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You Found It</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            background:
                linear-gradient(rgba(0,0,0,0.82), rgba(0,0,0,0.94)),
                url('images/background.png') center center / cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 25px;
        }

        .secret-box {
            max-width: 750px;
            background: rgba(0,0,0,0.72);
            border: 1px solid rgba(0,255,100,0.28);
            border-radius: 22px;
            padding: 40px 28px;
            box-shadow: 0 0 22px rgba(0,255,100,0.12);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00dd66;
            font-size: 2.8rem;
            margin-bottom: 18px;
        }

        p {
            font-size: 1.25rem;
            color: #d0d0d0;
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .code {
            display: inline-block;
            margin: 18px 0;
            padding: 14px 24px;
            border-radius: 14px;
            background: rgba(0,255,100,0.1);
            border: 1px solid rgba(0,255,100,0.35);
            color: #8cffb5;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            padding: 13px 24px;
            background: linear-gradient(135deg, #008c44, #00cc66);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="secret-box">
        <h1>You Found It</h1>

        <p>
            You found the hidden McBeth Gaming Easter egg.
        </p>

        <p>
            DM me on TikTok with this code for a chance to access the private server:
        </p>

        <div class="code">
            Sneakyloot
        </div>

        <p>
            First verified person to send the correct code gets the invite.
        </p>

        <a href="https://www.tiktok.com/@mcbethgaming" target="_blank">
            DM McBeth Gaming on TikTok
        </a>
    </div>

</body>
</html>
